name: Build/test
on:
  push:
    branches:
      - "main"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - 'main'
jobs:
  # ── Corpus + Rust + Python ──────────────────────────────────────────────────
  # Grammar corpus tests are OS-independent. Run them once on ubuntu rather
  # than in a 3-OS matrix to avoid paying 3x the cost for identical results.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: tree-sitter/setup-action@v2
        with:
          install-lib: false

      # Cache generated parsers + hash state keyed on all grammar source files.
      # src/tree_sitter/ headers are included so the test_node job can compile
      # the native binding without needing to re-run tree-sitter generate.
      - uses: actions/cache@v4
        with:
          path: |
            src/parser.c
            src/node-types.json
            src/tree_sitter/
            spark/src/parser.c
            spark/src/node-types.json
            databricks/src/parser.c
            databricks/src/node-types.json
            postgres/src/parser.c
            postgres/src/node-types.json
            mysql/src/parser.c
            mysql/src/node-types.json
            snowflake/src/parser.c
            snowflake/src/node-types.json
            mariadb/src/parser.c
            mariadb/src/node-types.json
            sqlite/src/parser.c
            sqlite/src/node-types.json
            hive/src/parser.c
            hive/src/node-types.json
            oracle/src/parser.c
            oracle/src/node-types.json
            db2/src/parser.c
            db2/src/node-types.json
            duckdb/src/parser.c
            duckdb/src/node-types.json
            .grammar-cache/
          key: parsers-${{ hashFiles('grammar.js', 'grammar/**', 'spark/grammar.js', 'spark/grammar/**', 'databricks/grammar.js', 'databricks/grammar/**', 'postgres/grammar.js', 'postgres/grammar/**', 'mysql/grammar.js', 'mysql/grammar/**', 'snowflake/grammar.js', 'snowflake/grammar/**', 'mariadb/grammar.js', 'mariadb/grammar/**', 'sqlite/grammar.js', 'sqlite/grammar/**', 'hive/grammar.js', 'hive/grammar/**', 'oracle/grammar.js', 'oracle/grammar/**', 'db2/grammar.js', 'db2/grammar/**', 'duckdb/grammar.js', 'duckdb/grammar/**') }}

      # Generate in dependency order; independent dialects run in parallel.
      # base → [spark | postgres | mysql | snowflake] → databricks
      - name: Generate parsers
        run: |
          node scripts/generate.js
          node scripts/generate.js spark &
          node scripts/generate.js postgres &
          node scripts/generate.js mysql &
          node scripts/generate.js snowflake &
          wait
          node scripts/generate.js databricks
          node scripts/generate.js mariadb
          node scripts/generate.js sqlite &
          node scripts/generate.js hive &
          node scripts/generate.js oracle &
          node scripts/generate.js db2 &
          node scripts/generate.js duckdb &
          wait

      - name: Run tests (base SQL)
        uses: tree-sitter/parser-test-action@v3
        with:
          test-rust: true
          test-node: false
          test-python: true

      - name: Run tests (Spark SQL)
        run: cd spark && tree-sitter test

      - name: Run tests (Databricks SQL)
        run: cd databricks && tree-sitter test

      - name: Run tests (PostgreSQL)
        run: cd postgres && tree-sitter test

      - name: Run tests (MySQL)
        run: cd mysql && tree-sitter test

      - name: Run tests (Snowflake)
        run: cd snowflake && tree-sitter test

      - name: Run tests (MariaDB)
        run: cd mariadb && tree-sitter test

      - name: Run tests (SQLite)
        run: cd sqlite && tree-sitter test

      - name: Run tests (Apache Hive)
        run: cd hive && tree-sitter test

      - name: Run tests (Oracle/PL-SQL)
        run: cd oracle && tree-sitter test

      - name: Run tests (IBM Db2)
        run: cd db2 && tree-sitter test

      - name: Run tests (DuckDB)
        run: cd duckdb && tree-sitter test

      - run: scripts/test-keywords.sh

  # ── Node native binding (OS matrix) ─────────────────────────────────────────
  # node-gyp compiles parser.c to a native .node addon. The result is
  # platform-specific, so this job stays as a 3-OS matrix.
  test_node:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-2025]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Re-use the same parser cache so generation is skipped on cache hit.
      # src/tree_sitter/ headers must be cached alongside parser.c: they are
      # generated together by tree-sitter generate and required by node-gyp to
      # compile binding.cc (include_dirs: ["src"] → #include "tree_sitter/parser.h").
      - uses: actions/cache@v4
        with:
          path: |
            src/parser.c
            src/node-types.json
            src/tree_sitter/
            .grammar-cache/
          key: parsers-${{ hashFiles('grammar.js', 'grammar/**', 'spark/grammar.js', 'spark/grammar/**', 'databricks/grammar.js', 'databricks/grammar/**', 'postgres/grammar.js', 'postgres/grammar/**', 'mysql/grammar.js', 'mysql/grammar/**', 'snowflake/grammar.js', 'snowflake/grammar/**') }}

      # npm ci runs the install hook: node scripts/generate.js && node-gyp-build
      # generate.js skips regeneration on cache hit; node-gyp-build compiles the
      # native addon from src/parser.c.
      - run: npm ci
      - run: node --test bindings/node/*_test.js

  # ── Validate corpus file integrity ──────────────────────────────────────────
  validate_tests:
    runs-on: ["ubuntu-latest"]
    strategy:
      fail-fast: true
    steps:
      - uses: actions/checkout@v4
      - run: |
          STATUS=0
          for dir in test spark/test databricks/test postgres/test mysql/test snowflake/test mariadb/test sqlite/test hive/test oracle/test db2/test duckdb/test; do
            if [[ $(grep -rn --exclude=errors.txt ERROR "$dir/" 2>/dev/null | wc -l) -gt 0 ]]; then
                echo "Found 'ERROR' in $dir: "
                grep -rn --exclude=errors.txt ERROR "$dir/" | cut -f1,2 -d:
                STATUS=1
            fi
            if [[ $(grep -rn --exclude=errors.txt MISSING "$dir/" 2>/dev/null | wc -l) -gt 0 ]]; then
                echo "Found 'MISSING' in $dir: "
                grep -rn --exclude=errors.txt MISSING "$dir/" | cut -f1,2 -d:
                STATUS=1
            fi
            if [[ $(grep -rn --exclude=errors.txt UNEXPECTED "$dir/" 2>/dev/null | wc -l) -gt 0 ]]; then
                echo "Found 'UNEXPECTED' in $dir: "
                grep -rn --exclude=errors.txt UNEXPECTED "$dir/" | cut -f1,2 -d:
                STATUS=1
            fi
          done
          exit $STATUS
